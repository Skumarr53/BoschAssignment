# [Phase 5b] CI pipeline: lint, test, build, security
# Plan: bosch_mlops_evaluation_plan_7132afe9
name: CI
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  UV_COMPILE_BYTECODE: '0'

jobs:
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          load: true
          push: false
          tags: biometric-mlops:ci
      - name: Validate K8s manifests
        run: make k8s-validate
      - name: Lint Helm chart
        run: make helm-lint
      - name: Template Helm chart
        run: make helm-template
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
      - name: Terraform fmt
        run: make tf-fmt
      - name: Terraform validate
        run: make tf-validate
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check src/ tests/ scripts/
      - name: Ruff format
        run: uv run ruff format --check src/ tests/ scripts/
      - name: Mypy
        run: uv run mypy src/ scripts/
      - name: Pre-commit
        run: uv run pre-commit run --all-files
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: pip-audit
        run: uv run pip-audit
      - name: Bandit
        run: uv run bandit -r src/ -ll
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Unit tests
        run: uv run pytest tests/unit/ -v --cov=src/biometric --cov-report=xml --cov-report=term --cov-fail-under=70
      - if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        name: Integration tests
        run: uv run pytest tests/integration/ -v
      - name: Performance tests
        run: uv run pytest tests/performance/ -v -m performance
