# [Phase 6c] ConfigMap for Hydra config injection
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "biometric-mlops.fullname" . }}-config
  namespace: {{ include "biometric-mlops.namespace" . }}
  labels:
    {{- include "biometric-mlops.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
