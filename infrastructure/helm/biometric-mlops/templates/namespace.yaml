# [Phase 6c/6e] Namespace with Pod Security Standards
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "biometric-mlops.namespace" . }}
  labels:
    {{- include "biometric-mlops.labels" . | nindent 4 }}
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
