# [Phase 6c] Production environment overrides
environment: prod
replicaCount: 1
resources:
  requests:
    memory: "4Gi"
    cpu: "2000m"
  limits:
    memory: "8Gi"
    cpu: "4000m"
persistence:
  data:
    size: 5Gi
    storageClass: null
  checkpoints:
    size: 20Gi
    storageClass: null
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilization: 70
  targetMemoryUtilization: 80
config:
  logLevel: "INFO"
image:
  pullPolicy: Always
