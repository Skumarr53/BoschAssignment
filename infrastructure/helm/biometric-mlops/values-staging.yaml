# [Phase 6c] Staging environment overrides
environment: staging
replicaCount: 1
resources:
  requests:
    memory: "2Gi"
    cpu: "1000m"
  limits:
    memory: "4Gi"
    cpu: "2000m"
persistence:
  data:
    size: 2Gi
  checkpoints:
    size: 10Gi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
config:
  logLevel: "INFO"
