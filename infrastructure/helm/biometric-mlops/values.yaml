# [Phase 6c] Default values for biometric-mlops
# Plan: bosch_mlops_evaluation_plan_7132afe9
# Override with -f values-dev.yaml | values-staging.yaml | values-prod.yaml

# Environment: dev | staging | prod
environment: dev

# Namespace (default: biometric-mlops)
namespaceOverride: biometric-mlops

# Override resource names (default: release-chart)
fullnameOverride: biometric-mlops

# Image
image:
  repository: bosch-biometric
  tag: latest
  pullPolicy: IfNotPresent

# Replicas (HPA overrides at runtime for scaling)
replicaCount: 1

# Resources
resources:
  requests:
    memory: "2Gi"
    cpu: "1000m"
  limits:
    memory: "4Gi"
    cpu: "2000m"

# Storage
persistence:
  data:
    enabled: true
    size: 1Gi
    storageClass: null  # Use cluster default
  checkpoints:
    enabled: true
    size: 5Gi
    storageClass: null

# Config
config:
  logLevel: "INFO"
  trainOverrides:
    - infrastructure=cluster

# HPA
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

# Security (Phase 6e)
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
